<!DOCTYPE html>
<html>
<head>
    <title>Vornex Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #1e293b;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #111827;
        }

        .amount {
            color: #22c55e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>💰 Vornex Financial Dashboard</h1>

<div class="card">
    <h2>📊 Total Transactions: {{ transactions|length }}</h2>
</div>

<table>
<tr>
    <th>ID</th>
    <th>Type</th>
    <th>Amount</th>
    <th>From</th>
    <th>To</th>
    <th>Time</th>
</tr>

{% for t in transactions %}
<tr>
    <td>{{ t[0] }}</td>
    <td>{{ t[1] }}</td>
    <td class="amount">{{ t[2] }} {{ t[3] }}</td>
    <td>{{ t[5] }}</td>
    <td>{{ t[6] }}</td>
    <td>{{ t[7] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
